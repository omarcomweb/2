    <style>
        :root {
            --primary-color: #ffcc00; /* اللون الأساسي المتغير */
        }

        body { 
            -webkit-user-select: none; -ms-user-select: none; user-select: none;
            background: #0a0c10; color: #fff; font-family: 'Tajawal', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
            min-width: 1024px; transition: background 0.3s, color 0.3s;
        }
        
        /* وضع الـ Zen */
        body.zen-mode .header-section, body.zen-mode .channel-list-container, body.zen-mode .dashboard { display: none !important; }
        body.zen-mode .video-wrapper { height: 100vh !important; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1c222d; padding: 30px; border-radius: 25px; text-align: center; max-width: 600px; width: 100%; border: 2px solid var(--primary-color); max-height: 90vh; overflow-y: auto; }
        .modal-content h2, .modal-content h3 { color: var(--primary-color); margin-bottom: 15px; font-size: 24px; }
        .modal-content p { color: #ccc; margin-bottom: 25px; line-height: 1.6; }
        
        /* ستايل الداشبورد الخارقة */
        .dashboard { padding: 15px; background: rgb(36, 0, 70); border-bottom: 2px solid var(--primary-color); display: none; }
        .dashboard.active { display: block; }
        .dashboard .row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px; }
        .dashboard .top-close-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .status-badge { background: #e74c3c; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .status-badge.active { background: #2ecc71; }
        
        .btn, .aplr-link, .btn-join, .btn-watch { 
            display: inline-block; box-sizing: border-box; padding: 8px 12px; margin-bottom: 5px; border-radius: 8px; 
            text-decoration: none; font-weight: bold; border: 1px solid transparent; font-size: 14px; cursor: pointer; transition: 0.2s; text-align: center;
            background: #111; color: #fff;
        }
        .btn:hover { filter: brightness(1.2); transform: scale(1.02); }
        .btn:active { transform: scale(0.95); }
        .btn-toggle[data-active="true"] { opacity: 0.7; }
        .btn-danger { background: #e74c3c; color: white; border-color: #c0392b; }
        .btn-outline { border: 1px solid #ccc; background: transparent; }

        .container { display: flex; flex-direction: column; height: 100%; width: 100%; }
        
        /* مقاس الشاشة المتناسق */
        .video-wrapper { position: relative; width: 100%; height: 60vh; min-height: 400px; background: #000; flex-shrink: 0; border-bottom: 2px solid #1c222d; transition: height 0.3s ease; }
        video, iframe { width: 100%; height: 100%; object-fit: contain; border: none; }
        
        /* الطبقة الشفافة لحماية الإعلانات */
        .iframe-overlay-protector { position: absolute; inset: 0; z-index: 15; display: none; }

        .loader-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 20; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top: 5px solid var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; }
        .sound-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--primary-color); color: #000; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: 900; z-index: 25; font-size: 16px; }
        
        .header-section { padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .brand { font-size: 24px; font-weight: 900; color: var(--primary-color); }
        .top-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .live-status-bar { display: flex; align-items: center; gap: 6px; padding: 6px 15px; border: 1px solid #ff0000; border-radius: 8px; color: #ff0000; font-weight: 700; font-size: 14px; background: rgba(255, 0, 0, 0.05); }

        .btn-dashboard, .btn-control {
            background: #1c222d; color: var(--primary-color); border: 1px solid var(--primary-color); padding: 6px 15px; 
            text-align: center; font-weight: bold; font-size: 14px; cursor: pointer; 
            border-radius: 8px; margin: 0; transition: 0.3s;
        }
        .btn-control { padding: 6px 12px; font-size: 16px; }
        .btn-dashboard:hover, .btn-control:hover { background: var(--primary-color); color: #000; }

        .btn-nav {
            background: var(--primary-color); color: #000; border: none; padding: 6px 20px; 
            text-align: center; font-weight: 900; font-size: 14px; cursor: pointer; 
            border-radius: 50px; margin: 0; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn-nav:hover { background: #fff; color: #000; transform: scale(1.05); }

        .channel-list-container { flex: 1; overflow-y: auto; padding: 15px; }
        .folder { margin-bottom: 10px; }
        .folder-header { background: #2c3546; padding: 15px 20px; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; border: 1px solid #3a475e; color: var(--primary-color); display: flex; justify-content: space-between; align-items: center; }
        .folder-header:hover { background: #3a475e; border-color: var(--primary-color); }
        .folder-content { display: none; padding: 10px 10px 0 10px; }
        .folder.active .folder-content { display: block; }
        .folder.active .folder-header { background: var(--primary-color); color: #000; }
        .folder-icon { font-size: 14px; transition: transform 0.3s; }
        .folder.active .folder-icon { transform: rotate(180deg); }

        .channel-bar { background: #1c222d; padding: 15px 20px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border: 1px solid #232936; margin-bottom: 8px; transition: 0.3s; font-size: 16px; }
        .channel-bar:hover { background: #252d3d; border-color: var(--primary-color); }
        .channel-bar.active-channel { background: #0055ff !important; border-color: #fff !important; box-shadow: 0 0 10px rgba(0, 85, 255, 0.4); }
        .channel-bar.active-channel .channel-name, .channel-bar.active-channel .live-indicator { color: #fff !important; font-weight: 900; }
        .channel-bar.active-channel .live-dot { background: #fff !important; }
        
        .live-indicator { display: flex; align-items: center; gap: 5px; color: #ff0000; font-size: 14px; font-weight: bold; transition: 0.3s; }
        .live-dot { width: 10px; height: 10px; background: #ff0000; border-radius: 50%; animation: pulse 1s infinite; transition: 0.3s; }
        
        .dashboard-input, select { box-sizing: border-box; background: #0a0c10; color: #fff; border: 1px solid var(--primary-color); border-radius: 8px; padding: 8px; font-family: monospace; }
        .iframe-list-box { text-align: right; max-height: 350px; overflow-y: auto; margin-bottom: 20px; background: #0a0c10; padding: 10px; border-radius: 10px; border: 1px solid #3a475e; }
        .channel-check { display: none; width: 18px; height: 18px; cursor: pointer; }
        .select-mode-active .channel-check { display: inline-block; margin-left: 10px; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

            <iframe id="iframe-player" allow="encrypted-media; autoplay" allowfullscreen style="display: none; transition: transform 0.3s ease;"></iframe>
        </div>

        <div class="header-section">
            <header class="header">
                <div class="brand">عمر سبورت</div>
                <div class="top-controls">
                    <button class="btn-nav" onclick="playNext()" title="التالية">التالي ⏭</button>
                    <button class="btn" style="background: #0088cc; color: white; border:none; padding:6px 15px; border-radius:50px; font-weight:bold; margin:0;" onclick="fetchCurrentIframe()">🔗 جلب Iframe</button>
                    <button class="btn-nav" onclick="playPrev()" title="السابقة">السابق ⏮</button>
                    
                    <button class="btn" style="background: #8e44ad; color:white; border:none; padding:6px 15px; border-radius:8px; margin:0;" onclick="window.openMultiManageModal()">🛠️ إدارة وتحديد</button>
                    <button class="btn" style="background: #e50914; color:white; border:none; padding:6px 15px; border-radius:8px; margin:0;" onclick="window.toggleDashboard()">⚙️ Dashboard</button>

                </div>
            </header>
            
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <input type="text" id="directPlayInput" class="dashboard-input" style="background: #1c222d; border-color: #3a475e;" placeholder="أدخل رابط مباشر لتشغيله فوراً...">
                <button class="btn-join" style="width: auto; padding: 10px 25px; margin: 0; background: #e74c3c; color: #fff; font-size: 14px;" onclick="playDirectLink()">▶ تشغيل مباشر</button>
            </div>
        </div>

        <div class="channel-list-container" id="channelList">
            <!-- سيتم الجلب هنا -->
        </div>
    </div>

    <script>
        let currentStreamUrl = '';
        let isSelectMode = false;
        let isEditMode = false;
        let iframeSandbox = false;
        let popupsBlocked = true;
        let autoSwitchInterval = null;

        // الجلب التلقائي (Firebase)
        window.addEventListener('DOMContentLoaded', () => {

                try {
                    var savedLink = localStorage.getItem('viberLinkSaved');
                    document.getElementById('viberLink').value = savedLink ? savedLink : 'firebase'; 
                    window.loadFromViber(true); 
                } catch(e) {}
            }, 500); 
        });

        // ====================== دوال الداشبورد والإدارة ======================
        window.toggleDashboard = function() {
            var d = document.getElementById('main-dashboard');
            d.classList.toggle('active');
        }

        window.openMultiManageModal = function() { document.getElementById('multiManageModal').style.display = 'flex'; }
        window.closeMultiManageModal = function() { document.getElementById('multiManageModal').style.display = 'none'; }
        
        window.toggleSelectMode = function() {
            isSelectMode = !isSelectMode;
            var list = document.getElementById('channelList');
            var btn = document.getElementById('btn-modal-select-mode');
            if(isSelectMode) {
                list.classList.add('select-mode-active');
                btn.innerText = "🔲 تعطيل وضع التحديد"; btn.style.background = "rgb(52, 152, 219)"; btn.style.color="#fff";
            } else {
                list.classList.remove('select-mode-active');
                btn.innerText = "🔲 تفعيل وضع التحديد"; btn.style.background = "rgb(17, 17, 17)"; btn.style.color="rgb(52, 152, 219)";
                document.querySelectorAll('.channel-check').forEach(chk => chk.checked = false);
            }
        }

        window.toggleEditMode = function() {
            isEditMode = !isEditMode;
            var btn = document.getElementById('btn-modal-edit-mode');
            document.querySelectorAll('.channel-name, .folder-header span:first-child').forEach(el => {
                el.contentEditable = isEditMode; el.style.border = isEditMode ? "1px dashed #fff" : "none";
            });
            if(isEditMode) {
                btn.innerText = "✏️ تعطيل التعديل"; btn.style.background = "rgb(241, 196, 15)"; btn.style.color="#000";
            } else {
                btn.innerText = "✏️ تفعيل التعديل والنقل"; btn.style.background = "rgb(17, 17, 17)"; btn.style.color="rgb(241, 196, 15)";
            }
        }

        window.openBulkModal = function() { window.closeMultiManageModal(); window.toggleDashboard(); }

        window.addNewFolder = function() {
            var fName = prompt("أدخل اسم المجلد:");
            if(fName) {
                var fId = 'folder-' + Math.random().toString(36).substr(2, 9);
                var html = `<div class="folder active" id="${fId}"><div class="folder-header" onclick="toggleFolder(this.parentElement)"><span contenteditable="${isEditMode}">📁 ${fName}</span><span class="folder-icon">▼</span></div><div class="folder-content"></div></div>`;
                document.getElementById('channelList').insertAdjacentHTML('afterbegin', html);
            }
        }
        window.addNewChannel = function() {
            var cName = prompt("اسم القناة:"); var cLink = prompt("الرابط:");
            if(cName && cLink) {
                var html = `<div class="channel-bar" onclick="loadStream('${cLink.replace(/'/g, "\\'")}'); event.stopPropagation();"><input type="checkbox" class="channel-check" onclick="event.stopPropagation();"><span class="channel-name" contenteditable="${isEditMode}">${cName}</span><div class="live-indicator"><div class="live-dot"></div> Live</div></div>`;
                var target = document.querySelector('.folder-content');
                if(target) target.insertAdjacentHTML('beforeend', html); else document.getElementById('channelList').insertAdjacentHTML('afterbegin', html);
            }
        }

        window.selectAllItems = function() { if(!isSelectMode) toggleSelectMode(); document.querySelectorAll('.channel-check').forEach(c => c.checked = true); }
        window.deleteSelected = function() {
            var chks = document.querySelectorAll('.channel-check:checked');
            if(chks.length > 0 && confirm("مسح " + chks.length + " قناة؟")) { chks.forEach(c => c.closest('.channel-bar').remove()); }
        }

        window.copyCurrentPlayingLink = function() { if(currentStreamUrl) copyToClipboard(currentStreamUrl); else alert("لا توجد قناة تعمل!"); }
        window.copySelectedLinks = function() {
            var chks = document.querySelectorAll('.channel-check:checked'); var links = [];
            chks.forEach(c => { var oc = c.closest('.channel-bar').getAttribute('onclick'); if(oc){var m=oc.match(/'([^']+)'/); if(m) links.push(m[1]);} });
            if(links.length > 0) copyToClipboard(links.join('\n')); else alert("حدد قنوات أولاً");
            window.closeMultiManageModal();
        }
        window.copyAllLinks = function() {
            var links = []; document.querySelectorAll('.channel-bar').forEach(b => { var oc = b.getAttribute('onclick'); if(oc){var m=oc.match(/'([^']+)'/); if(m) links.push(m[1]);} });
            copyToClipboard(links.join('\n'));
        }

        window.openXtreamModal = function() { alert("سيتم تفعيل ربط حسابات Xtream في التحديث القادم!"); };
        window.openStalkerModal = function() { alert("سيتم تفعيل ربط حسابات Stalker في التحديث القادم!"); };
        window.handleFolderFileInput = function(event) { window.handleFileUpload(event); };

        // ====================== دوال الحماية والثيمات ======================
        let isInspectBlocked = false;
        window.toggleInspect = function() {
            isInspectBlocked = !isInspectBlocked; 
            document.querySelectorAll('#btn-inspect').forEach(btn => {
                if(isInspectBlocked) { btn.innerText="🕵️ منع الفحص (مفعل)"; btn.style.background="rgb(47, 54, 64)"; btn.style.color="#fff"; }
                else { btn.innerText="🕵️ منع الفحص (معطل)"; btn.style.background="transparent"; btn.style.color="rgb(47, 54, 64)"; }
            });
        }
        document.addEventListener('contextmenu', e => { if(isInspectBlocked) e.preventDefault(); });
        document.addEventListener('keydown', e => { if(isInspectBlocked && (e.keyCode==123 || e.ctrlKey)) e.preventDefault(); });

        let isOverlayActive = false;
        window.toggleOverlay = function() {
            isOverlayActive = !isOverlayActive; var overlay = document.getElementById('iframeOverlayProtector');
            document.querySelectorAll('#btn-overlay').forEach(btn => {
                if(isOverlayActive) { overlay.style.display='block'; btn.innerText="👻 الطبقة الشفافة (مفعلة)"; btn.style.background="rgb(220, 221, 225)"; btn.style.color="#000"; }
                else { overlay.style.display='none'; btn.innerText="👻 الطبقة الشفافة (معطلة)"; btn.style.background="transparent"; btn.style.color="rgb(220, 221, 225)"; }
            });
            if(isOverlayActive) alert("الطبقة الشفافة مفعلة! لن يستطيع أحد النقر على الفيديو.");
        }

        window.toggleSandbox = function() {
            iframeSandbox = !iframeSandbox; updateIframeAttrs();
            document.querySelectorAll('#btn-sandbox').forEach(btn => {
                if(iframeSandbox) { btn.innerText="🔒 قيود التشغيل (مفعلة)"; btn.style.background="rgb(231, 76, 60)"; btn.style.color="#fff"; }
                else { btn.innerText="🔒 قيود التشغيل (معطلة)"; btn.style.background="transparent"; btn.style.color="rgb(231, 76, 60)"; }
            });
        }
        window.togglePopups = function() {
            popupsBlocked = !popupsBlocked; updateIframeAttrs();
            document.querySelectorAll('#btn-popups').forEach(btn => {
                if(popupsBlocked) { btn.innerText="🚫 النوافذ المنبثقة (ممنوعة)"; btn.style.background="rgb(231, 76, 60)"; btn.style.color="#fff"; }
                else { btn.innerText="🚫 النوافذ المنبثقة (مسموحة)"; btn.style.background="transparent"; btn.style.color="rgb(231, 76, 60)"; }
            });
        }
        function updateIframeAttrs() {
            var ifr = document.getElementById('iframe-player');
            if(iframeSandbox) { var s = "allow-scripts allow-same-origin"; if(!popupsBlocked) s+=" allow-popups allow-popups-to-escape-sandbox"; ifr.setAttribute('sandbox', s); }
            else { ifr.removeAttribute('sandbox'); }
            if(ifr.style.display==='block') reloadCurrentStream();
        }

        let strictProtect = true;
        window.toggleStrictProtect = function() {
            strictProtect = !strictProtect;
            document.querySelectorAll('#btn-strict-protect').forEach(b => {
                if(strictProtect) { b.innerText="🛡️ حماية قصوى (مفعلة)"; b.style.background="rgb(46, 213, 115)"; b.style.color="#fff"; }
                else { b.innerText="🛡️ حماية قصوى (معطلة)"; b.style.background="transparent"; b.style.color="rgb(46, 213, 115)"; }
            });
            document.querySelectorAll('#btn-super-blocker').forEach(b => {
                if(strictProtect) { b.innerText="⚠️ الحماية القصوى (مفعلة)"; b.style.background="rgb(46, 213, 115)"; }
                else { b.innerText="⚠️ الحماية القصوى (معطل)"; b.style.background="rgb(192, 57, 43)"; }
            });
        }

        window.changeThemeSelect = function() {
            var selects = document.querySelectorAll('#theme-selector');
            var val = selects[0].value; var color = '#ffcc00'; 
            if(val === 'bein') color = '#9b59b6'; else if(val === 'ssc') color = '#2ecc71'; else if(val === 'sky') color = '#3498db';
            else if(val === 'madrid') color = '#bdc3c7'; else if(val === 'barca') color = '#e74c3c';
            document.documentElement.style.setProperty('--primary-color', color);
            selects.forEach(s => s.value = val);
        }

        window.toggleZenMode = function() { document.body.classList.toggle('zen-mode'); window.closeMultiManageModal(); }
        document.addEventListener('keydown', e => { if(e.key==="Escape" && document.body.classList.contains('zen-mode')) document.body.classList.remove('zen-mode'); });

        window.toggleAutoSwitch = function() {
            var btn = document.getElementById('btn-auto-switch');
            if(autoSwitchInterval) { 
                clearInterval(autoSwitchInterval); autoSwitchInterval = null; 
                btn.innerText="متوقف"; btn.style.background="transparent"; btn.style.color="rgb(243, 156, 18)"; 
                document.getElementById('stream-status').innerText="⚫ متوقف"; document.getElementById('stream-status').classList.remove('active'); 
            } else { 
                var sec = parseInt(document.getElementById('auto-switch-sec').value)*1000 || 10000;
                autoSwitchInterval = setInterval(playNext, sec); 
                btn.innerText="مفعل"; btn.style.background="rgb(243, 156, 18)"; btn.style.color="#fff"; 
                document.getElementById('stream-status').innerText="🟢 تقليب..."; document.getElementById('stream-status').classList.add('active');
            }
        }

        // ====================== سحب وتحميل ======================
        window.loadFromViber = window.doLoadFromFirebase = function(isAuto = false) {
            var url = document.getElementById('viberLink').value; if(!url.trim()) return;
            if(url.trim().toLowerCase() === 'firebase') {
                db.ref('playlist').once('value').then(snap => { var d = snapshot.val(); if(d) { document.getElementById('m3u8Data').value = d; importM3u8(isAuto); } }); return;
            }
            fetch(url).then(r=>r.text()).then(d=>{ document.getElementById('m3u8Data').value=d; importM3u8(isAuto); }).catch(e=>{});
        }
        window.saveViberLink = function() { var url = document.getElementById('viberLink').value; if(url) { localStorage.setItem('viberLinkSaved', url); alert("تم حفظ المسار."); } }
        window.uploadToFirebase = window.doSaveToFirebase = function() {
            exportM3u8(); var d = document.getElementById('m3u8Data').value;
            db.ref('playlist').set(d).then(() => alert('تم رفع القنوات للسيرفر بنجاح!')).catch(e=>alert('خطأ في الرفع. تأكد من قواعد Rules الفايربيز.'));
        }

        window.handleFileUpload = function(e) { var file = e.target.files[0]; if(!file) return; var r = new FileReader(); r.onload = function(ev) { document.getElementById('m3u8Data').value = ev.target.result; importM3u8(false); document.getElementById('fileUpload').value = ''; }; r.readAsText(file); }
        
        window.downloadM3uFile = window.exportAllToM3U = function() { exportM3u8(); var d = document.getElementById('m3u8Data').value; if(!d.trim()||d=="#EXTM3U")return; var b = new Blob([d],{type:'text/plain'}); var u=URL.createObjectURL(b); var a=document.createElement('a'); a.href=u; a.download='channels.m3u'; a.click(); }
        window.downloadFullHTML = window.downloadAsHTML = function() { var prev1 = document.getElementById('main-dashboard').style.display; var prev2 = document.getElementById('multiManageModal').style.display; document.getElementById('main-dashboard').style.display='none'; document.getElementById('multiManageModal').style.display='none'; var b = new Blob(["<!DOCTYPE html>\n<html lang=\"ar\" dir=\"rtl\">\n"+document.documentElement.innerHTML+"\n</html>"],{type:'text/html'}); var a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='omar_sport.html'; a.click(); document.getElementById('main-dashboard').style.display=prev1; document.getElementById('multiManageModal').style.display=prev2;}
        
        window.openImportUrlModal = function() { document.getElementById('addUrlModal').style.display='flex'; }
        window.fetchUrlToChannels = function() {
            var u = document.getElementById('importUrlInput').value; if(!u)return;
            fetch(u).then(r=>r.text()).then(d=>{ document.getElementById('m3u8Data').value=d; importM3u8(false); document.getElementById('addUrlModal').style.display='none'; }).catch(e=>alert("فشل الجلب"));
        }

        window.extractIframesFromURL = window.extractFromInput = function() {
            var url = document.getElementById('iframe-extractor-url').value;
            if(url) { currentStreamUrl = url; window.fetchCurrentIframe(); } else { alert("ضع رابطاً أولاً!"); }
        }

        // ====================== M3U Builder ======================
        function importM3u8(isAuto = false) {
            var data = document.getElementById('m3u8Data').value; if(!data.trim()) return;
            var lines = data.split('\n'); var container = document.getElementById('channelList'); var folders = {}; var cFolder = "عام"; var cName = "";
            lines.forEach(l => {
                l=l.trim(); if(!l)return;
                if(l.toUpperCase().startsWith('#EXTINF')) { var m=l.match(/group-title="([^"]+)"/i)||l.match(/group-title=([^,]+)/i); cFolder=m?m[1].trim():"عام"; var idx=l.lastIndexOf(','); cName=(idx>-1)?l.substring(idx+1).trim():"قناة"; }
                else if(l.startsWith('http')||l.includes('<iframe')||l.startsWith('rtmp')||l.startsWith('ftp')) { if(!folders[cFolder]) folders[cFolder]=[]; folders[cFolder].push({n:cName||"قناة", u:l}); cName=""; }
                else if(l.includes(',')) { var p=l.split(','); if(p.length>=3){ if(!folders[p[0].trim()])folders[p[0].trim()]=[]; folders[p[0].trim()].push({n:p[1].trim(), u:p.slice(2).join(',').trim()}); } else { if(!folders["عام"])folders["عام"]=[]; folders["عام"].push({n:p[0].trim(), u:p[1].trim()}); } cName="";}
            });
            var html = '';
            ["القنوات المحددة","المقاطع المحددة"].forEach(n => {
                if(folders[n]) { folders[n].forEach(c => { html+=`<div class="channel-bar" onclick="loadStream('${c.u.replace(/'/g,"\\'")}'); event.stopPropagation();"><input type="checkbox" class="channel-check" onclick="event.stopPropagation()"><span class="channel-name" contenteditable="${isEditMode}">${c.n}</span><div class="live-indicator"><div class="live-dot"></div> Live</div></div>`; }); delete folders[n]; }
            });
            for(var f in folders) {
                html+=`<div class="folder" id="f-${Math.random().toString(36).substr(2,9)}"><div class="folder-header" onclick="toggleFolder(this.parentElement)"><span contenteditable="${isEditMode}">📁 ${f}</span><span class="folder-icon">▼</span></div><div class="folder-content">`;
                folders[f].forEach(c => { html+=`<div class="channel-bar" onclick="loadStream('${c.u.replace(/'/g,"\\'")}'); event.stopPropagation();"><input type="checkbox" class="channel-check" onclick="event.stopPropagation()"><span class="channel-name" contenteditable="${isEditMode}">${c.n}</span><div class="live-indicator"><div class="live-dot"></div> Live</div></div>`; });
                html+='</div></div>';
            }
            container.innerHTML = html;
            if(isSelectMode) container.classList.add('select-mode-active');
            document.querySelectorAll('.channel-bar').forEach(ch => { if(ch.getAttribute('onclick') && ch.getAttribute('onclick').includes(currentStreamUrl) && currentStreamUrl) ch.classList.add('active-channel'); });
            if(!isAuto) alert("تم تحديث القنوات بنجاح!");
        }

        window.exportSelectedM3U = function() {
            var checked = document.querySelectorAll('.channel-check:checked'); if(checked.length === 0) { alert("حدد قنوات أولاً!"); return; }
            var exportData = ["#EXTM3U"];
            checked.forEach(chk => { var bar = chk.closest('.channel-bar'); var name = bar.querySelector('.channel-name').textContent; var m = bar.getAttribute('onclick').match(/'([^']+)'/); if(m){ var folder = bar.closest('.folder'); var fn = folder ? folder.querySelector('span').textContent.replace('📁','').trim() : "محدد"; exportData.push('#EXTINF:-1 group-title="'+fn+'",'+name+'\n'+m[1]); } });
            var b = new Blob([exportData.join('\n')], {type:'text/plain'}); var a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='قنوات_محددة.m3u'; a.click();
        }
        window.copySelectedM3U = function() {
            var checked = document.querySelectorAll('.channel-check:checked'); if(checked.length === 0) { alert("حدد قنوات أولاً!"); return; }
            var exportData = ["#EXTM3U"];
            checked.forEach(chk => { var bar = chk.closest('.channel-bar'); var name = bar.querySelector('.channel-name').textContent; var m = bar.getAttribute('onclick').match(/'([^']+)'/); if(m){ var folder = bar.closest('.folder'); var fn = folder ? folder.querySelector('span').textContent.replace('📁','').trim() : "محدد"; exportData.push('#EXTINF:-1 group-title="'+fn+'",'+name+'\n'+m[1]); } });
            copyToClipboard(exportData.join('\n'));
        }

        function exportM3u8() {
            var exp=["#EXTM3U"];
            document.querySelectorAll('#channelList > .channel-bar').forEach(c=>{var n=c.querySelector('.channel-name').textContent; var m=c.getAttribute('onclick').match(/'([^']+)'/); if(m)exp.push('#EXTINF:-1 group-title="القنوات المحددة",'+n+'\n'+m[1]);});
            document.querySelectorAll('.folder').forEach(f=>{var fn=f.querySelector('span').textContent.replace('📁','').trim(); f.querySelectorAll('.channel-bar').forEach(c=>{var n=c.querySelector('.channel-name').textContent; var m=c.getAttribute('onclick').match(/'([^']+)'/); if(m)exp.push('#EXTINF:-1 group-title="'+fn+'",'+n+'\n'+m[1]);});});
            document.getElementById('m3u8Data').value=exp.join('\n');
        }

        window.copyAllM3U = function() { exportM3u8(); copyToClipboard(document.getElementById('m3u8Data').value); }

        // ====================== Iframe Deep Scan ======================
        window.closeIframeModal = function() { document.getElementById('iframeModal').style.display='none'; }
        window.fetchCurrentIframe = async function() {
            if(!currentStreamUrl){ alert("شغل قناة أولاً"); return; }
            if(currentStreamUrl.toLowerCase().includes('.m3u8') || currentStreamUrl.toLowerCase().includes('.mp4')) { alert("هذا فيديو وليس إطار!"); return; }
            document.getElementById('iframeModal').style.display='flex'; var list = document.getElementById('iframeList'); list.innerHTML='<div style="color:var(--primary-color); text-align:center;">جاري البحث العميق وتخطي الحماية... ⏳</div>';
            var found = [];
            try { let r=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(currentStreamUrl)); found=extractUrls(await r.text(), currentStreamUrl); } catch(e){}
            if(found.length==0) try { let r=await fetch('https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(currentStreamUrl)); found=extractUrls(await r.text(), currentStreamUrl); } catch(e){}
            if(found.length==0) try { let r=await fetch('https://corsproxy.io/?'+encodeURIComponent(currentStreamUrl)); found=extractUrls(await r.text(), currentStreamUrl); } catch(e){}
            
            var ui = buildIframeRow('الرابط الأساسي', currentStreamUrl);
            found.forEach((u,i) => ui+=buildIframeRow('إطار '+(i+1), u));
            list.innerHTML = ui;
        }
        function extractUrls(html, base) {
            let ex=[]; if(!html)return ex; let rx=/<iframe[^>]+(?:src|data-src)=["']([^"']+)["']/gi; let m;
            while((m=rx.exec(html))!==null){ let u=m[1].trim(); if(u&&u!=='about:blank'&&!u.startsWith('java')){ if(u.startsWith('//'))u='https:'+u; else if(u.startsWith('/')){let ob=new URL(base);u=ob.origin+u;} ex.push(u); } }
            return [...new Set(ex)];
        }
        function buildIframeRow(t,u) { let s=u.replace(/"/g,'&quot;'); return `<div style="display:flex; justify-content:space-between; background:#1c222d; padding:10px; margin-bottom:10px; border-radius:8px;"><span style="color:#fff; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;"><b style="color:var(--primary-color)">${t}:</b> ${s}</span><button class="btn" style="width:auto; margin:0; border-color:#28a745; color:#28a745;" onclick="copyToClipboard('${s}')">نسخ اللينك</button></div>`; }
        function copyToClipboard(t) { var i=document.createElement("input"); i.value=t; document.body.appendChild(i); i.select(); document.execCommand("copy"); document.body.removeChild(i); alert("تم النسخ بنجاح! 📋"); }

        // ====================== المشغل والتحكم ======================
        var video = document.getElementById('video'); var iframe = document.getElementById('iframe-player'); var loader = document.getElementById('loader'); var hls = new Hls({maxBufferLength:20, liveSyncDurationCount:3, lowLatencyMode:true});
        window.loadStream = function(url) {
            document.getElementById('directPlayInput').value=''; currentStreamUrl=url; document.getElementById('videoWrapper').style.height='60vh';
            document.querySelectorAll('.channel-bar').forEach(c=>{ c.classList.remove('active-channel'); if(c.getAttribute('onclick')&&url!==''&&c.getAttribute('onclick').includes(url)) c.classList.add('active-channel'); });

            loader.style.display='flex'; document.getElementById('soundBtn').style.display='block'; currentRotation=0; video.style.transform='rotate(0deg)'; iframe.style.transform='rotate(0deg)';
            if(hls)hls.detachMedia(); video.pause(); video.src=''; iframe.src=''; video.style.display='none'; iframe.style.display='none';
            if(url.includes('<iframe')){ var m=url.match(/src=["'](.*?)["']/); if(m)url=m[1]; }
            var isV = url.toLowerCase().includes('.m3u8') || url.toLowerCase().includes('.mp4');
            if(isV) { video.style.display='block'; video.muted=true; if(url.toLowerCase().includes('.m3u8')){if(Hls.isSupported()){hls.loadSource(url);hls.attachMedia(video);}else video.src=url;}else{video.src=url;video.load();video.play().catch(e=>{});} }
            else { updateIframeAttrs(); iframe.style.display='block'; iframe.src=url; document.getElementById('soundBtn').style.display='none'; iframe.onload=function(){loader.style.display='none';}; setTimeout(()=>{loader.style.display='none';},3000); }
        }
        hls.on(Hls.Events.MANIFEST_PARSED, function(){video.play();}); video.addEventListener('playing', ()=>{loader.style.display='none';}); video.addEventListener('waiting', ()=>{loader.style.display='flex';}); video.addEventListener('error', ()=>{loader.style.display='none';});
        document.getElementById('soundBtn').addEventListener('click', function(){ video.muted=false; this.style.display='none'; });

        window.playNext = function() { var cs=document.querySelectorAll('.channel-bar'); if(cs.length==0)return; var idx=-1; for(var i=0;i<cs.length;i++){if(cs[i].getAttribute('onclick')&&cs[i].getAttribute('onclick').includes(currentStreamUrl)){idx=i;break;}} var n=idx+1; if(n>=cs.length)n=0; cs[n].click(); }
        window.playPrev = function() { var cs=document.querySelectorAll('.channel-bar'); if(cs.length==0)return; var idx=-1; for(var i=0;i<cs.length;i++){if(cs[i].getAttribute('onclick')&&cs[i].getAttribute('onclick').includes(currentStreamUrl)){idx=i;break;}} var p=idx-1; if(p<0)p=cs.length-1; cs[p].click(); }
        window.openExternal = function() { if(currentStreamUrl) window.open(currentStreamUrl,'_blank'); else alert("لا توجد قناة!"); }
        window.closePlayer = window.closePlayerScreen = function() { if(hls)hls.detachMedia(); video.pause(); video.src=''; iframe.src=''; currentStreamUrl=''; document.querySelectorAll('.channel-bar').forEach(c=>c.classList.remove('active-channel')); video.style.display='none'; iframe.style.display='none'; loader.style.display='none'; document.getElementById('videoWrapper').style.height='0'; }
        window.rotatePlayer = function() { currentRotation+=90; if(currentRotation>=360)currentRotation=0; var t='rotate('+currentRotation+'deg)'; video.style.transform=t; iframe.style.transform=t; }
        window.toggleFullScreen = function() { var w=document.getElementById('videoWrapper'); if(!document.fullscreenElement){if(w.requestFullscreen)w.requestFullscreen();else if(w.webkitRequestFullscreen)w.webkitRequestFullscreen();}else{if(document.exitFullscreen)document.exitFullscreen();} }
        window.playDirectLink = function() { var u=document.getElementById('directPlayInput').value; if(u)loadStream(u); }
        window.reloadCurrentStream = function() { if(currentStreamUrl)loadStream(currentStreamUrl); }
        window.toggleFolder = function(el) { el.classList.toggle('active'); }
    </script>
</body>
</html>
